<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | OESTE Barbearia</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23111111'/%3E%3Ctext x='32' y='43' text-anchor='middle' font-size='38' font-family='Georgia,serif' fill='%23c9a84c'%3EO%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111111;
      --card: #1f1f1f;
      --gold: #c9a84c;
      --text: #f5f5f5;
      --error: #e05555;
      --ok: #25d366;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #111111 0%, #151515 35%, #111111 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 2rem;
      box-shadow: 0 10px 40px rgba(0,0,0,.5);
    }

    .logo {
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 800;
      font-size: 2rem;
      color: var(--gold);
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      text-align: center;
      color: #c9c9c9;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text);
    }

    input {
      width: 100%;
      padding: 0.85rem;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      background: #111111;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--gold);
      color: #111;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: filter 0.2s ease;
      font-family: inherit;
    }

    .btn:hover {
      filter: brightness(1.1);
    }

    .error {
      background: rgba(224, 85, 85, 0.15);
      border: 1px solid var(--error);
      color: #ff9999;
      padding: 0.75rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
      font-size: 0.9rem;
    }

    .error.show {
      display: block;
    }

    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }

    .back-link a {
      color: var(--gold);
      font-size: 0.9rem;
      cursor: pointer;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">OESTE</div>
    <div class="subtitle">Painel de Administrador</div>

    <div class="error" id="errorMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="senhaAdmin">Senha de Admin</label>
        <input type="password" id="senhaAdmin" placeholder="Digite a senha" required>
      </div>

      <button type="submit" class="btn">Entrar</button>
    </form>

    <div class="back-link">
      <a href="index.html">← Voltar para o site</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const senhaInput = document.getElementById('senhaAdmin');
    const errorMsg = document.getElementById('errorMsg');

    // Senha de admin padrão (IMPORTANTE: mudar em produção!)
    const SENHA_ADMIN = 'admin123';

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      errorMsg.classList.remove('show');

      if (senhaInput.value !== SENHA_ADMIN) {
        errorMsg.textContent = 'Senha incorreta';
        errorMsg.classList.add('show');
        return;
      }

      localStorage.setItem('admin_autenticado', 'true');
      window.location.href = 'admin-painel.html';
    });
  </script>
</body>
</html>
